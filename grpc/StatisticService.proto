syntax = "proto3";
import "google/protobuf/empty.proto";

/// Runs in the REPL. gRPC sinks call this to report statistic results.
service StatisticCoordinatorService {
  rpc ReportStatistic (StatisticReport) returns (google.protobuf.Empty) {}
}

/// Runs on the worker (inside gRPC source). Coordinator calls this to trigger probes.
service StatisticSourceService {
  rpc RequestStatistic (StatisticRequest) returns (google.protobuf.Empty) {}
}

message StatisticRequest {
  uint64 statistic_id = 1;
  uint64 start_ts = 2;
  uint64 end_ts = 3;
}

message StatisticReport {
  uint64 statistic_id = 1;
  uint64 start_ts = 2;
  uint64 end_ts = 3;
  double value = 4;
}
